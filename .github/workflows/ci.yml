name: CI

on:
  push:
    branches:
      - main
      - "phase*"
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  focused-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy pandas pillow opencv-python-headless bcrypt cryptography python-dotenv pip-audit

      - name: Audit focused dependencies
        continue-on-error: true
        run: |
          python -m pip_audit

      - name: Run focused tests
        env:
          SECRET_KEY: ci-secret-key-with-at-least-thirty-two-characters
          SALT: ci-salt-with-more-than-sixteen-chars
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: ci-admin-password-123
        run: |
          python -m pytest \
            tests/test_password_hashing.py \
            tests/test_recognition_decision.py \
            tests/test_reset_expires_parse.py \
            tests/test_security_config.py \
            tests/test_student_repository.py \
            tests/test_attendance_pipeline.py \
            tests/test_mask_gate.py
